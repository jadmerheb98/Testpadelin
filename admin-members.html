<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members | PADELIN Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner header-gd">
      <div class="header-left">
        <a class="brand" href="index.html" aria-label="PADELIN Home">
          <img src="assets/img/logo.png" alt="PADELIN Logo" />
        </a>
      </div>

      <div class="header-right">
        <button class="btn btn-ghost" type="button" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </header>

  <main class="contact-page">
    <div class="container">

      <section class="contact-hero">
        <div class="contact-eyebrow" id="roleEyebrow">Staff</div>
        <h1>Members</h1>
        <p>Search and view member profiles. Admin can update member details and points.</p>

        <div style="margin-top:14px;">
          <a href="admin-messages.html" class="btn btn-ghost members-back-btn" id="backToDashboardBtn">← Back</a>
        </div>
      </section>

      <article class="contact-card">
        <div class="contact-card-head">
          <div class="contact-card-title">Member Search</div>
          <div class="contact-card-sub">Search by name, phone, or email</div>
        </div>

        <div class="contact-card-body">
  <div class="members-searchbar">
    <input
      id="memberSearchInput"
      class="inbox-search"
      type="text"
      placeholder="Search by name, phone, or email"
      autocomplete="off"
    />
    <button id="memberSearchBtn" class="members-search-btn" type="button" aria-label="Search">
      🔍
    </button>
  </div>

  <div id="selectedMemberCard" style="display:none; margin-top:14px;"></div>

  <div id="membersResults" class="inbox-list" style="margin-top:14px;"></div>

  <div id="membersResultsEmpty" class="form-note dash-note" style="display:block; margin-top:14px;">
    Search for a member by name, phone, or email.
  </div>
</div>
      </article>

    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Padelin | Members</div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>

  <script>
    const auth = window.padelinAuth;
    const db = window.padelinDB;

    const roleEyebrow = document.getElementById("roleEyebrow");
    const logoutBtn = document.getElementById("logoutBtn");

    const memberSearchInput = document.getElementById("memberSearchInput");
const memberSearchBtn = document.getElementById("memberSearchBtn");
const selectedMemberCard = document.getElementById("selectedMemberCard");
const membersResults = document.getElementById("membersResults");
const membersResultsEmpty = document.getElementById("membersResultsEmpty");

    let allMembers = [];
    let selectedMemberId = null;
    let isAdmin = false;

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getFilteredMembers() {
      const q = (memberSearchInput?.value || "").trim().toLowerCase();
      if (!q) return [];

      return allMembers.filter(user => {
        const name = String(user.name || "").toLowerCase();
        const phone = String(user.phone || "").toLowerCase();
        const email = String(user.email || "").toLowerCase();
        return name.includes(q) || phone.includes(q) || email.includes(q);
      });
    }

    function renderSelectedMemberCard() {
  if (!selectedMemberCard) return;

  if (!selectedMemberId) {
    selectedMemberCard.style.display = "none";
    selectedMemberCard.innerHTML = "";
    return;
  }

  const user = allMembers.find(m => m.id === selectedMemberId);
  if (!user) {
    selectedMemberCard.style.display = "none";
    selectedMemberCard.innerHTML = "";
    return;
  }

  function formatAnyDate(value) {
  if (!value) return "—";

  if (typeof value === "string") return value;

  if (value.seconds) {
    const d = new Date(value.seconds * 1000);
    return d.toLocaleString("en-US", {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
  }

  if (value.toDate && typeof value.toDate === "function") {
    const d = value.toDate();
    return d.toLocaleString("en-US", {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
  }

  return String(value);
}

const createdAt = formatAnyDate(user.createdAt);
const updatedAt = formatAnyDate(user.updatedAt);
const source = user.source || "—";
const uid = user.uid || user.id || "—";

  selectedMemberCard.style.display = "block";

  if (isAdmin) {
    selectedMemberCard.innerHTML = `
      <article class="resdash-item" style="border:1px solid rgba(63,102,150,0.18); box-shadow:0 8px 22px rgba(15,23,42,0.06);">
        <div class="resdash-item-top">
          <div class="resdash-item-title">${esc(user.name || user.email || "Member")}</div>
          <div class="resdash-time">${esc(String(Number(user.points || 0)))} pts</div>
        </div>

        <div class="member-detail-grid">
          <div class="member-field">
            <label>Name</label>
            <input id="editMemberName" type="text" value="${esc(user.name || "")}">
          </div>

          <div class="member-field">
            <label>Phone</label>
            <input id="editMemberPhone" type="text" value="${esc(user.phone || "")}">
          </div>

          <div class="member-field">
            <label>Email</label>
            <input id="editMemberEmail" type="text" value="${esc(user.email || "")}">
          </div>

          <div class="member-field">
            <label>Points</label>
            <input id="editMemberPoints" type="number" min="0" value="${esc(String(Number(user.points || 0)))}">
          </div>

          <div class="member-field">
            <label>UID</label>
            <input type="text" value="${esc(uid)}" readonly>
          </div>

          <div class="member-field">
            <label>Created by</label>
            <input type="text" value="${esc(source)}" readonly>
          </div>

          <div class="member-field">
            <label>Created at</label>
            <input type="text" value="${esc(createdAt)}" readonly>
          </div>

          <div class="member-field">
            <label>Updated at</label>
            <input type="text" value="${esc(updatedAt)}" readonly>
          </div>
        </div>

        <div class="member-detail-actions">
          <button class="btn btn-ghost" type="button" id="clearSelectedMemberBtn">Back</button>
          <button class="btn btn-primary" type="button" id="saveMemberBtn">Save Changes</button>
        </div>
      </article>
    `;
  } else {
    selectedMemberCard.innerHTML = `
      <article class="resdash-item" style="border:1px solid rgba(63,102,150,0.18); box-shadow:0 8px 22px rgba(15,23,42,0.06);">
        <div class="resdash-item-top">
          <div class="resdash-item-title">${esc(user.name || user.email || "Member")}</div>
          <div class="resdash-time">${esc(String(Number(user.points || 0)))} pts</div>
        </div>

        <div class="member-detail-grid">
          <div class="member-field">
            <label>Name</label>
            <input type="text" value="${esc(user.name || "")}" readonly>
          </div>

          <div class="member-field">
            <label>Phone</label>
            <input type="text" value="${esc(user.phone || "")}" readonly>
          </div>

          <div class="member-field">
            <label>Email</label>
            <input type="text" value="${esc(user.email || "")}" readonly>
          </div>

          <div class="member-field">
            <label>Points</label>
            <input type="text" value="${esc(String(Number(user.points || 0)))}" readonly>
          </div>

          <div class="member-field">
            <label>UID</label>
            <input type="text" value="${esc(uid)}" readonly>
          </div>

          <div class="member-field">
            <label>Created by</label>
            <input type="text" value="${esc(source)}" readonly>
          </div>

          <div class="member-field">
            <label>Created at</label>
            <input type="text" value="${esc(createdAt)}" readonly>
          </div>

          <div class="member-field">
            <label>Updated at</label>
            <input type="text" value="${esc(updatedAt)}" readonly>
          </div>
        </div>

        <div class="member-detail-actions">
          <button class="btn btn-ghost" type="button" id="clearSelectedMemberBtn">Back</button>
        </div>
      </article>
    `;
  }

  document.getElementById("clearSelectedMemberBtn")?.addEventListener("click", () => {
    selectedMemberId = null;
    selectedMemberCard.style.display = "none";
    selectedMemberCard.innerHTML = "";
    membersResults.innerHTML = "";
    membersResultsEmpty.style.display = "block";
    membersResultsEmpty.textContent = "Search for a member by name, phone, or email.";
  });

  document.getElementById("saveMemberBtn")?.addEventListener("click", async () => {
    const nextName = (document.getElementById("editMemberName")?.value || "").trim();
    const nextPhone = (document.getElementById("editMemberPhone")?.value || "").trim();
    const nextEmail = (document.getElementById("editMemberEmail")?.value || "").trim().toLowerCase();
    const nextPoints = Number(document.getElementById("editMemberPoints")?.value || 0);

    if (!nextName || !nextPhone || !nextEmail) {
      alert("Name, phone, and email are required.");
      return;
    }

    if (!Number.isFinite(nextPoints) || nextPoints < 0) {
      alert("Points must be a valid number.");
      return;
    }

    try {
      const previousPoints = Number(user.points || 0);

      await db.collection("users").doc(user.id).set({
        name: nextName,
        phone: nextPhone,
        email: nextEmail,
        points: nextPoints,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }, { merge: true });

      if (previousPoints !== nextPoints) {
        const currentUser = auth?.currentUser;
        const token = currentUser ? await currentUser.getIdToken() : "";

        await fetch("https://solitary-morning-9ea4.padelin-lb.workers.dev/admin/update-member-points", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            memberId: user.id,
            memberName: nextName,
            memberEmail: nextEmail,
            memberPhone: nextPhone,
            previousPoints,
            nextPoints,
            actor: "admin"
          })
        });
      }

      allMembers = allMembers.map(m =>
        m.id === user.id
          ? {
              ...m,
              name: nextName,
              phone: nextPhone,
              email: nextEmail,
              points: nextPoints
            }
          : m
      );

      renderSelectedMemberCard();
      alert("Member updated.");
    } catch (e) {
      console.error(e);
      alert(e.message || "Failed to save member.");
    }
  });
}
    function renderMembersResults(list) {
  membersResults.innerHTML = "";

  if (!Array.isArray(list) || !list.length) {
    membersResultsEmpty.style.display = "block";
    membersResultsEmpty.textContent = "No members found.";
    return;
  }

  membersResultsEmpty.style.display = "none";

  list.forEach(user => {
    const row = document.createElement("article");
    row.className = "member-result-item";

    row.innerHTML = `
      <div class="member-result-top">
        <div class="member-result-name">${esc(user.name || user.email || "Member")}</div>
        <div class="member-result-phone">${esc(user.phone || "—")}</div>
      </div>
    `;

    row.addEventListener("click", () => {
      selectedMemberId = user.id;
      renderSelectedMemberCard();
      membersResults.innerHTML = "";
      membersResultsEmpty.style.display = "none";
      selectedMemberCard.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    membersResults.appendChild(row);
  });
}

    function runMemberSearch() {
  const filtered = getFilteredMembers();

  selectedMemberId = null;
  renderSelectedMemberCard();

  if (!filtered.length) {
    membersResults.innerHTML = "";
    membersResultsEmpty.style.display = "block";
    membersResultsEmpty.textContent = "No members found.";
    return;
  }

  renderMembersResults(filtered);
}

if (memberSearchBtn) {
  memberSearchBtn.addEventListener("click", runMemberSearch);
}

if (memberSearchInput) {
  memberSearchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      runMemberSearch();
    }
  });
}

    async function loadMembers() {
  try {
    const snap = await db.collection("users").get();

    allMembers = snap.docs
      .map(doc => ({ id: doc.id, ...(doc.data() || {}) }))
      .sort((a, b) => Number(b.points || 0) - Number(a.points || 0));
  } catch (err) {
    console.error("Failed to load members:", err);
    membersResultsEmpty.style.display = "block";
    membersResultsEmpty.textContent = "Could not load members.";
  }
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const dn = String(user.displayName || "");
  const isStaff = dn.startsWith("STAFF:");
  isAdmin = dn === "STAFF:ADMIN";

  if (!isStaff) {
    await auth.signOut();
    window.location.href = "login.html";
    return;
  }

  if (roleEyebrow) roleEyebrow.textContent = isAdmin ? "Admin" : "Staff";

  await loadMembers();
});
  </script>
</body>
</html>
