<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Leaderboard | PADELIN Admin</title>
  <link rel="stylesheet" href="css/styles.css?v=20" />
</head>
<body>

  <header class="header">
    <div class="container header-inner header-gd">
      <div class="header-left">
        <a class="brand" href="admin-messages.html" aria-label="Back to Dashboard">
          <img src="assets/img/logo.png" alt="PADELIN Logo" />
        </a>
      </div>
      <div class="header-right">
        <a class="btn btn-ghost" href="admin-messages.html">Back</a>
      </div>
    </div>
  </header>

  <main class="contact-page">
    <div class="container">
      <section class="contact-hero">
        <div class="contact-eyebrow">Admin</div>
        <h1>Edit Leaderboard</h1>
        <p>Update the public leaderboard manually and save changes.</p>
      </section>

      <section class="contact-card">
        <div class="contact-card-head">
          <div class="contact-card-title">Leaderboard Editor</div>
          <div class="contact-card-sub">Top 5 players shown on homepage and leaderboard page</div>
        </div>

        <div class="contact-card-body">
  <div class="dashboard-actions" style="margin-bottom:16px;">
    <button class="btn btn-ghost" type="button" id="addLeaderboardRowBtn">
      + Add Player
    </button>
  </div>

  <div id="leaderboardRows"></div>

  <div class="dashboard-actions" style="margin-top:16px;">
    <button class="btn btn-primary" type="button" id="saveLeaderboardBtn">
      Save Leaderboard
    </button>
  </div>

  <div class="form-note" id="leaderboardMsg" style="margin-top:12px;"></div>
</div>

          <div class="form-note" id="leaderboardMsg" style="margin-top:12px;"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Padelin | Admin</div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>

  <script>
    (function staffGate(){
      if (!window.padelinAuth) return;
      window.padelinAuth.onAuthStateChanged((u) => {
        const isAdmin = (u?.displayName || "") === "STAFF:ADMIN";
        if (!u || !isAdmin) {
          window.location.href = "login.html";
        }
      });
    })();

    (function leaderboardEditorSetup(){
  if (!window.padelinDB) return;

  const db = window.padelinDB;
  const rowsWrap = document.getElementById("leaderboardRows");
  const saveBtn = document.getElementById("saveLeaderboardBtn");
  const addBtn = document.getElementById("addLeaderboardRowBtn");
  const msg = document.getElementById("leaderboardMsg");

  if (!rowsWrap || !saveBtn || !addBtn || !msg) return;

  function setMsg(text, ok = null) {
    msg.textContent = text || "";
    msg.classList.remove("is-success", "is-error");
    if (ok === true) msg.classList.add("is-success");
    if (ok === false) msg.classList.add("is-error");
  }

  function createRow(item = {}, index = 0) {
    const row = document.createElement("div");
    row.className = "leaderboard-editor-row";
    row.style.display = "grid";
    row.style.gridTemplateColumns = "minmax(0, 1fr) 110px 110px auto";
    row.style.gap = "10px";
    row.style.alignItems = "center";
    row.style.marginBottom = "12px";

    row.innerHTML = `
      <input
        type="text"
        class="leaderboard-name"
        value="${String(item.name || "").replace(/"/g, "&quot;")}"
        placeholder="Player name"
      />

      <input
        type="number"
        class="leaderboard-wins"
        min="0"
        value="${Number(item.wins || 0)}"
        placeholder="Wins"
      />

      <input
        type="number"
        class="leaderboard-points"
        min="0"
        value="${Number(item.points || 0)}"
        placeholder="Points"
      />

      <button type="button" class="btn btn-ghost leaderboard-remove-btn">Remove</button>
    `;

    const removeBtn = row.querySelector(".leaderboard-remove-btn");
    removeBtn.addEventListener("click", () => {
      row.remove();
      refreshRemoveButtons();
    });

    rowsWrap.appendChild(row);
  }

  function refreshRemoveButtons() {
    const rows = Array.from(rowsWrap.querySelectorAll(".leaderboard-editor-row"));
    rows.forEach((row, index) => {
      const btn = row.querySelector(".leaderboard-remove-btn");
      if (!btn) return;
      btn.style.display = rows.length <= 5 ? "none" : "inline-flex";
    });
  }

  function renderRows(items) {
    rowsWrap.innerHTML = "";

    const safeItems = Array.isArray(items) && items.length ? items : [];

    if (safeItems.length) {
      safeItems.forEach((item, index) => createRow(item, index));
    } else {
      for (let i = 0; i < 5; i++) {
        createRow({}, i);
      }
    }

    refreshRemoveButtons();
  }

  function collectRows() {
    const rows = Array.from(rowsWrap.querySelectorAll(".leaderboard-editor-row"));

    return rows.map((row, index) => {
      const name = (row.querySelector(".leaderboard-name")?.value || "").trim() || `Player ${index + 1}`;
      const wins = Number(row.querySelector(".leaderboard-wins")?.value || 0);
      const points = Number(row.querySelector(".leaderboard-points")?.value || 0);

      return {
        rank: index + 1,
        name,
        wins,
        points
      };
    });
  }

  async function loadLeaderboard() {
    try {
      setMsg("Loading...");
      const snap = await db.collection("system").doc("leaderboard").get();

      if (!snap.exists) {
        renderRows([]);
        setMsg("");
        return;
      }

      const data = snap.data() || {};
      renderRows(Array.isArray(data.items) ? data.items : []);
      setMsg("");
    } catch (err) {
      console.error(err);
      setMsg("Failed to load leaderboard.", false);
    }
  }

  async function saveLeaderboard() {
    try {
      setMsg("Saving...");

      const items = collectRows();

      await db.collection("system").doc("leaderboard").set({
        items,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      setMsg("Leaderboard saved.", true);
    } catch (err) {
      console.error(err);
      setMsg("Failed to save leaderboard.", false);
    }
  }

  addBtn.addEventListener("click", () => {
    createRow({});
    refreshRemoveButtons();
  });

  saveBtn.addEventListener("click", saveLeaderboard);
  loadLeaderboard();
})();

      function renderRows(items) {
        rowsWrap.innerHTML = "";

        for (let i = 0; i < 5; i++) {
          const item = items[i] || {};
          const row = document.createElement("div");
          row.className = "auth-row";
          row.style.marginBottom = "18px";

          row.innerHTML = `
            <div class="form-note" style="margin-bottom:10px;">Rank ${i + 1}</div>

            <label for="lbName${i}">Player Name</label>
            <input id="lbName${i}" type="text" value="${String(item.name || "").replace(/"/g, "&quot;")}" placeholder="Player name" />

            <div style="height:10px;"></div>

            <label for="lbWins${i}">Wins</label>
            <input id="lbWins${i}" type="number" min="0" value="${Number(item.wins || 0)}" placeholder="Wins" />

            <div style="height:10px;"></div>

            <label for="lbPoints${i}">Points</label>
            <input id="lbPoints${i}" type="number" min="0" value="${Number(item.points || 0)}" placeholder="Points" />
          `;

          rowsWrap.appendChild(row);
        }
      }

      async function loadLeaderboard() {
        try {
          setMsg("Loading...");
          const snap = await db.collection("system").doc("leaderboard").get();

          if (!snap.exists) {
            renderRows([]);
            setMsg("");
            return;
          }

          const data = snap.data() || {};
          renderRows(Array.isArray(data.items) ? data.items : []);
          setMsg("");
        } catch (err) {
          console.error(err);
          setMsg("Failed to load leaderboard.", false);
        }
      }

      async function saveLeaderboard() {
        try {
          setMsg("Saving...");

          const items = [];

          for (let i = 0; i < 5; i++) {
            items.push({
              rank: i + 1,
              name: (document.getElementById(`lbName${i}`)?.value || "").trim() || `Player ${i + 1}`,
              wins: Number(document.getElementById(`lbWins${i}`)?.value || 0),
              points: Number(document.getElementById(`lbPoints${i}`)?.value || 0)
            });
          }

          await db.collection("system").doc("leaderboard").set({
            items,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });

          setMsg("Leaderboard saved.", true);
        } catch (err) {
          console.error(err);
          setMsg("Failed to save leaderboard.", false);
        }
      }

      saveBtn.addEventListener("click", saveLeaderboard);
      loadLeaderboard();
    })();
  </script>
</body>
</html>
