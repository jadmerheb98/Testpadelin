<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Leaderboard | PADELIN Admin</title>
  <link rel="stylesheet" href="css/styles.css?v=20" />
  <style>
  .leaderboard-row-item input {
    width: 100%;
    box-sizing: border-box;
  }

  .leaderboard-row-item {
    min-width: 0;
  }
</style>
</head>
<body>

  <header class="header">
    <div class="container header-inner header-gd">
      <div class="header-left">
        <a class="brand" href="admin-messages.html" aria-label="Back to Dashboard">
          <img src="assets/img/logo.png" alt="PADELIN Logo" />
        </a>
      </div>
      <div class="header-right"></div>
    </div>
  </header>

  <main class="contact-page">
    <div class="container">
      <section class="contact-hero">
        <div class="contact-eyebrow">Admin</div>
        <h1>Edit Leaderboard</h1>
        <p>Update the public leaderboard manually and save changes.</p>

<div style="margin-top:14px;">
  <a href="admin-messages.html" class="btn btn-ghost members-back-btn" id="backToDashboardBtn">← Back</a>
</div>
      </section>

      <section class="contact-card">
        <div class="contact-card-head">
          <div class="contact-card-title">Leaderboard Editor</div>
          <div class="contact-card-sub">Top 5 players shown on homepage and leaderboard page</div>
        </div>

        <div class="contact-card-body">
          <div class="members-searchbar" style="margin-bottom:18px;">
  <input
    id="leaderboardSearchInput"
    class="inbox-search"
    type="text"
    placeholder="Search player by name"
    autocomplete="off"
  />
  <button id="leaderboardSearchBtn" class="members-search-btn" type="button" aria-label="Search">🔍</button>
</div>

<div id="leaderboardRows"></div>

          <div class="dashboard-actions" style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
  <button class="btn btn-ghost" type="button" id="addLeaderboardRowBtn">
    + Add Player
  </button>

  <button class="btn btn-primary" type="button" id="saveLeaderboardBtn">
    Save Leaderboard
  </button>
</div>

          <div class="form-note" id="leaderboardMsg" style="margin-top:12px;"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Padelin | Admin</div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>

  <script>
    (function staffGate(){
      if (!window.padelinAuth) return;
      window.padelinAuth.onAuthStateChanged((u) => {
        const isAdmin = (u?.displayName || "") === "STAFF:ADMIN";
        if (!u || !isAdmin) {
          window.location.href = "login.html";
        }
      });
    })();

    (function leaderboardEditorSetup(){
      if (!window.padelinDB) return;

      const db = window.padelinDB;
const rowsWrap = document.getElementById("leaderboardRows");
const saveBtn = document.getElementById("saveLeaderboardBtn");
const addBtn = document.getElementById("addLeaderboardRowBtn");
const msg = document.getElementById("leaderboardMsg");
const leaderboardSearchInput = document.getElementById("leaderboardSearchInput");
const leaderboardSearchBtn = document.getElementById("leaderboardSearchBtn");

function runLeaderboardSearch() {
  const q = (leaderboardSearchInput?.value || "").trim().toLowerCase();
  const rows = Array.from(rowsWrap.querySelectorAll(".leaderboard-row-item"));

  if (!q) {
    rows.forEach((row) => {
      row.style.display = "";
    });
    return;
  }

  let firstMatch = null;

  rows.forEach((row, index) => {
    const nameValue = (document.getElementById(`lbName${index}`)?.value || "").trim().toLowerCase();
    const match = nameValue.includes(q);

    row.style.display = match ? "" : "none";

    if (match && !firstMatch) {
      firstMatch = row;
    }
  });

  if (firstMatch) {
    firstMatch.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

if (!rowsWrap || !saveBtn || !addBtn || !msg) return;

      function setMsg(text, ok = null) {
        msg.textContent = text || "";
        msg.classList.remove("is-success", "is-error");
        if (ok === true) msg.classList.add("is-success");
        if (ok === false) msg.classList.add("is-error");
      }

     function renderRows(items) {
  rowsWrap.innerHTML = "";

  const safeItems = Array.isArray(items) ? items : [];
  const total = Math.max(5, safeItems.length);

  for (let i = 0; i < total; i++) {
    const item = safeItems[i] || {};
    const row = document.createElement("div");
    row.className = "leaderboard-row-item";
    row.style.marginBottom = "8px";

    row.innerHTML = `
      <div style="display:grid; gap:8px; padding:10px; border:1px solid rgba(15,23,42,0.08); border-radius:12px; background:rgba(15,23,42,0.02);">
        
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
          <div style="font-size:14px; font-weight:700; color:#0f172a;">Rank ${i + 1}</div>
          <button
            type="button"
            class="btn btn-ghost leaderboard-remove-btn"
            data-index="${i}"
            style="display:${i < 5 ? "none" : "inline-flex"}; padding:8px 12px; min-height:auto;"
          >
            Remove
          </button>
        </div>

        <div>
          <label for="lbName${i}" style="display:block; margin-bottom:4px; font-size:12px;">Player</label>
          <input
            id="lbName${i}"
            type="text"
            value="${String(item.name || "").replace(/"/g, "&quot;")}"
            placeholder="Player name"
            style="padding:10px 12px; min-height:auto;"
          />
        </div>

        <div style="display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:8px;">
          <div>
            <label for="lbWins${i}" style="display:block; margin-bottom:4px; font-size:12px;">Wins</label>
            <input
              id="lbWins${i}"
              type="number"
              min="0"
              value="${Number(item.wins || 0)}"
              placeholder="Wins"
              style="padding:10px 12px; min-height:auto;"
            />
          </div>

          <div>
            <label for="lbPoints${i}" style="display:block; margin-bottom:4px; font-size:12px;">Points</label>
            <input
              id="lbPoints${i}"
              type="number"
              min="0"
              value="${Number(item.points || 0)}"
              placeholder="Points"
              style="padding:10px 12px; min-height:auto;"
            />
          </div>
        </div>
      </div>
    `;

    rowsWrap.appendChild(row);
  }

  rowsWrap.querySelectorAll(".leaderboard-remove-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const rows = Array.from(rowsWrap.querySelectorAll(".leaderboard-row-item"));
      const nextItems = rows.map((_, index) => ({
        name: document.getElementById(`lbName${index}`)?.value || "",
        wins: Number(document.getElementById(`lbWins${index}`)?.value || 0),
        points: Number(document.getElementById(`lbPoints${index}`)?.value || 0)
      }));

      const removeIndex = Number(btn.dataset.index);
      nextItems.splice(removeIndex, 1);
      renderRows(nextItems);
    });
  });
}

      async function loadLeaderboard() {
        try {
          setMsg("Loading...");
          const snap = await db.collection("system").doc("leaderboard").get();

          if (!snap.exists) {
            renderRows([]);
            setMsg("");
            return;
          }

          const data = snap.data() || {};
          renderRows(Array.isArray(data.items) ? data.items : []);
          setMsg("");
        } catch (err) {
          console.error(err);
          setMsg("Failed to load leaderboard.", false);
        }
      }

     async function saveLeaderboard() {
  try {
    setMsg("Saving...");

    const items = [];
    const rows = rowsWrap.querySelectorAll(".leaderboard-row-item");

    rows.forEach((row, i) => {
      items.push({
        rank: i + 1,
        name: (document.getElementById(`lbName${i}`)?.value || "").trim() || `Player ${i + 1}`,
        wins: Number(document.getElementById(`lbWins${i}`)?.value || 0),
        points: Number(document.getElementById(`lbPoints${i}`)?.value || 0)
      });
    });

    await db.collection("system").doc("leaderboard").set({
      items,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    setMsg("Leaderboard saved.", true);
  } catch (err) {
    console.error(err);
    setMsg("Failed to save leaderboard.", false);
  }
}

addBtn.addEventListener("click", () => {
  const currentRows = rowsWrap.querySelectorAll(".leaderboard-row-item").length;
  const items = [];

  for (let i = 0; i < currentRows; i++) {
    items.push({
      name: document.getElementById(`lbName${i}`)?.value || "",
      wins: Number(document.getElementById(`lbWins${i}`)?.value || 0),
      points: Number(document.getElementById(`lbPoints${i}`)?.value || 0)
    });
  }

  items.push({
    name: "",
    wins: 0,
    points: 0
  });

  renderRows(items);
});

if (leaderboardSearchBtn) {
  leaderboardSearchBtn.addEventListener("click", runLeaderboardSearch);
}

if (leaderboardSearchInput) {
  leaderboardSearchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      runLeaderboardSearch();
    }
  });

  leaderboardSearchInput.addEventListener("input", () => {
    if (!leaderboardSearchInput.value.trim()) {
      runLeaderboardSearch();
    }
  });
}

saveBtn.addEventListener("click", saveLeaderboard);
loadLeaderboard();
    })();
  </script>
</body>
</html>
