<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leaderboard | PADELIN</title>
  <link rel="stylesheet" href="./css/styles.css?v=20" />
</head>
<body>

  <header class="header">
    <div class="container header-inner header-gd">
      <div class="header-left">
        <button class="hamburger" type="button" aria-label="Open menu" data-hamburger>
          <div class="hamburger-lines" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </button>

        <a class="brand" href="index.html" aria-label="PADELIN Home">
          <img src="assets/img/logo.png" alt="PADELIN Logo" />
        </a>
      </div>

      <div class="header-right">
        <a class="icon-btn" href="contact.html" aria-label="Contact us">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M6.6 10.8c1.5 3 3.6 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.9.6.6 0 1 .4 1 1V21c0 .6-.4 1-1 1C10.1 22 2 13.9 2 3c0-.6.4-1 1-1h3.3c.6 0 1 .4 1 1 0 1.4.2 2.7.6 3.9.1.4 0 .8-.3 1.1l-2 2.8z"/>
          </svg>
        </a>

        <button class="icon-btn" type="button" aria-label="Account" data-auth-open>
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M12 12c2.8 0 5-2.2 5-5s-2.2-5-5-5-5 2.2-5 5 2.2 5 5 5zm0 2c-4.4 0-8 2.2-8 5v1c0 .6.4 1 1 1h14c.6 0 1-.4 1-1v-1c0-2.8-3.6-5-8-5z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="overlay" data-overlay></div>
  <aside class="side-menu" data-side-menu aria-label="Mobile menu">
    <div class="side-menu-header">
      <div class="side-menu-title">Menu</div>
      <button class="side-menu-close" type="button" aria-label="Close menu" data-side-close>✕</button>
    </div>
    <div class="side-links">
      <a href="./membership.html">Membership</a>
      <a href="./training.html">Live Coaches</a>
      <a href="./tournaments.html">Tournaments</a>
    </div>
  </aside>

  <main>
  
    <section class="section">
      <div class="container">
        <div class="section-intro">
          <span class="section-tag">RANKINGS</span>
          <h2 class="section-headline">Current Club Standings</h2>
        </div>

        <div class="table-card">
          <table class="table" aria-label="Leaderboard">
            <thead>
              <tr>
                <th>#</th>
                <th>Player</th>
                <th>Wins</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="leaderboardTableBody">
              <tr>
                <td><span class="rank-badge">1</span></td>
                <td><strong>Player One</strong></td>
                <td>12</td>
                <td>38</td>
              </tr>
              <tr>
                <td><span class="rank-badge silver">2</span></td>
                <td><strong>Player Two</strong></td>
                <td>10</td>
                <td>32</td>
              </tr>
              <tr>
                <td><span class="rank-badge bronze">3</span></td>
                <td><strong>Player Three</strong></td>
                <td>9</td>
                <td>28</td>
              </tr>
              <tr>
                <td>4</td>
                <td>Player Four</td>
                <td>8</td>
                <td>25</td>
              </tr>
              <tr>
                <td>5</td>
                <td>Player Five</td>
                <td>7</td>
                <td>22</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Padelin | Byblos, Lebanon</div>
  </footer>

  <div class="acc-overlay" data-acc-overlay></div>

  <aside class="acc-drawer" data-acc-drawer aria-hidden="true" aria-label="Account">
    <div class="acc-head">
      <div class="acc-title">Account</div>
      <button class="acc-close" type="button" aria-label="Close" data-acc-close>✕</button>
    </div>

    <div class="acc-body" id="accBody"></div>
  </aside>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./js/firebase-init.js"></script>
  <script src="./js/main.js?v=20"></script>
</body>
</html>
