<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collect Points</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f172a; color:white;">

<div style="
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
">

  <div style="width:100%; max-width:360px; text-align:center;">

    <!-- LOGO -->
    <img src="assets/img/logo.png" style="height:55px; margin-bottom:20px;" />

    <!-- TITLE -->
    <h2 style="margin:0 0 10px; font-size:24px;">Collect Your Points</h2>

    <!-- SUBTEXT -->
    <p style="margin:0 0 20px; font-size:14px; opacity:0.7;">
      After your match, enter your phone number to receive your rewards.
    </p>

    <!-- INPUT -->
    <input id="phone" placeholder="Enter your phone number" style="
      width:100%;
      padding:14px;
      border-radius:10px;
      border:none;
      margin-bottom:12px;
      font-size:15px;
      text-align:center;
      outline:none;
    " />

    <!-- BUTTON -->
    <button onclick="collectPoints()" id="btn" style="
      width:100%;
      padding:14px;
      border-radius:10px;
      border:none;
      background:#3F6696;
      color:white;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
    ">
      Collect Points
    </button>

    <!-- RESULT -->
    <div id="result" style="
      margin-top:20px;
      padding:14px;
      border-radius:10px;
      font-size:14px;
      background:rgba(255,255,255,0.08);
    ">
      Ready to scan
    </div>

  </div>
</div>

<script>
async function collectPoints() {
  const phone = document.getElementById("phone").value.trim();
  const resultBox = document.getElementById("result");
  const btn = document.getElementById("btn");

  if (!phone) {
    resultBox.style.background = "rgba(239,68,68,0.2)";
    resultBox.innerText = "Please enter your phone number";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Checking...";
  resultBox.style.background = "rgba(255,255,255,0.08)";
  resultBox.innerText = "Checking your reservation...";

  const date = new Date().toLocaleDateString("en-US", {
    weekday: "short",
    month: "short",
    day: "numeric",
    year: "numeric"
  });

  try {
    const res = await fetch("https://solitary-morning-9ea4.padelin-lb.workers.dev/qr/validate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone, date })
    });

    const data = await res.json();

    if (data.status === "collected") {
      resultBox.style.background = "rgba(16,185,129,0.25)";
      resultBox.innerText = `Points collected successfully 🎉 +${data.points}`;
    }

    else if (data.status === "waiting") {
      resultBox.style.background = "rgba(245,158,11,0.25)";
      resultBox.innerText = "Waiting for staff confirmation. Please check with reception.";
    }

    else if (data.status === "no_show") {
      resultBox.style.background = "rgba(239,68,68,0.25)";
      resultBox.innerText = "This reservation was marked as no show.";
    }

    else if (data.status === "already_collected") {
      resultBox.style.background = "rgba(59,130,246,0.25)";
      resultBox.innerText = "Points already collected for this reservation.";
    }

    else {
      resultBox.style.background = "rgba(239,68,68,0.25)";
      resultBox.innerText = "No reservation found for today.";
    }

  } catch (e) {
    console.error(e);
    resultBox.style.background = "rgba(239,68,68,0.25)";
    resultBox.innerText = "Connection error. Try again.";
  }

  btn.disabled = false;
  btn.innerText = "Collect Points";
}
</script>

</body>
</html>
