<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up | PADELIN</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="header">
  <div class="container header-inner header-gd">
    <div class="header-left">
      <button class="hamburger" type="button" aria-label="Open menu" data-hamburger>
        <div class="hamburger-lines" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </button>

      <a class="brand" href="index.html" aria-label="PADELIN Home">
        <img src="assets/img/logo.png" alt="PADELIN Logo" />
      </a>
    </div>

    <div class="header-right">
      <!-- intentionally empty on signup -->
    </div>
  </div>
</header>

  <div class="overlay" data-overlay></div>

<aside class="side-menu" data-side-menu aria-label="Mobile menu">
  <div class="side-menu-header">
    <div class="side-menu-title">Menu</div>
    <button class="side-menu-close" type="button" aria-label="Close menu" data-side-close>✕</button>
  </div>

  <div class="side-links">
    <a href="membership.html">Membership</a>
    <a href="training.html">Training</a>
    <a href="tournaments.html">Tournaments</a>
  </div>
</aside>
  
  <main class="auth-page">
    <div class="container">
      <div class="auth-hero">
        <div class="auth-eyebrow">Create account</div>
      </div>

      <div class="auth-card">
        <div class="auth-card-head">
          <div class="auth-card-title">Sign Up</div>
          <div class="auth-card-sub">Takes less than a minute.</div>
        </div>

        <form class="auth-form-grid">
          <label for="name">Full name <span aria-hidden="true">*</span></label>
<input
  id="name"
  name="name"
  type="text"
  placeholder="Your name"
  autocomplete="name"
  required
/>

<label for="email">Email <span aria-hidden="true">*</span></label>
<input
  id="email"
  name="email"
  type="email"
  placeholder="you@email.com"
  autocomplete="email"
  required
/>

<label for="phone">Phone number <span aria-hidden="true">*</span></label>
<input
  id="phone"
  name="phone"
  type="tel"
  inputmode="tel"
  placeholder="+961 …"
  autocomplete="tel"
  required
/>

<label for="password">Password <span aria-hidden="true">*</span></label>
<input
  id="password"
  name="password"
  type="password"
  placeholder="Create a strong password"
  minlength="8"
  autocomplete="new-password"
  required
/>
<div class="auth-hint">Minimum 8 characters — letters & numbers.</div>

<label for="confirmPassword">Confirm password <span aria-hidden="true">*</span></label>
<input
  id="confirmPassword"
  name="confirmPassword"
  type="password"
  placeholder="Re-enter your password"
  minlength="8"
  autocomplete="new-password"
  required
/>

          <button class="btn btn-primary auth-submit" type="submit">Create Account</button>

          <div class="auth-footer">
            Already have an account?
            <a class="auth-link" href="login.html">Sign in</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Padelin | Byblos, Lebanon</div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/main.js"></script>
</body>
</html>
