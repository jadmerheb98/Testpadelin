<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | PADELIN</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="PADELIN Home">
        <img src="assets/img/logo.svg" alt="PADELIN Logo" />
        <span>PADELIN</span>
      </a>

      <nav class="nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="reservation.html">Reserve</a>
        <a href="login.html">Login</a>
      </nav>

      <button class="hamburger" type="button" aria-label="Open menu" data-hamburger>
        <div class="hamburger-lines" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </button>
    </div>
  </header>

  <div class="overlay" data-overlay></div>
  <aside class="side-menu" data-side-menu aria-label="Mobile menu">
    <div class="side-menu-header">
      <div class="side-menu-title">Menu</div>
      <button class="side-menu-close" type="button" aria-label="Close menu" data-side-close>✕</button>
    </div>
    <div class="side-links">
      <a href="membership.html">Membership</a>
      <a href="training.html">Training</a>
      <a href="tournaments.html">Tournaments</a>
    </div>
  </aside>

  <main class="center-wrap">
    <div class="panel">
      <h2>Login</h2>

      <form>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button class="btn btn-primary" type="submit">Login</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Padelin | Byblos, Lebanon</div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
